<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS Pro | 进化系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        /* 修复日历尺寸的关键 CSS */
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 6px; 
            max-width: 100%;
        }
        .day-cell { 
            aspect-ratio: 1 / 1; /* 强制正方形 */
            border-radius: 8px; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            font-size: 11px; 
            transition: 0.2s; 
            position: relative;
            background: #f8fafc;
        }
        .day-cell:hover { background: #e2e8f0; }
        .signed { background: #10b981 !important; color: white; box-shadow: 0 2px 4px rgba(16,185,129,0.2); }
        
        .status-dot { width: 4px; height: 4px; border-radius: 50%; position: absolute; bottom: 4px; }
        .done-item { text-decoration: line-through; color: #94a3b8; filter: grayscale(1); background: #f8fafc !important; }
        .progress-bar { transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>

                </div>
            </div>
