<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LifeOS Pro V15</title>

    <!-- Vue -->
    <script src="https://cdn.staticfile.org/vue/3.3.4/vue.global.prod.js"></script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #fdf2f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
        }

        [v-cloak] { display: none; }

        .card {
            background: white;
            border-radius: 20px;
            border: 1px solid #f1f5f9;
        }

        .chart-container {
            height: 200px;
        }
    </style>
</head>

<body>

<div id="app" v-cloak class="max-w-md mx-auto p-4">

    <section class="space-y-4">

        <div class="flex justify-between items-center">
            <h1 class="text-xl font-black">Wealth Log</h1>
            <button @click="showChart = !showChart">📈</button>
        </div>

        <div v-if="showChart" class="card p-4">

            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>

            <div class="flex justify-around mt-4 text-sm">

                <button @click="render('total')" class="px-3 py-1 bg-gray-100 rounded">
                    总资产
                </button>

                <button @click="render('alipay')" class="px-3 py-1 bg-blue-100 rounded">
                    支付宝
                </button>

                <button @click="render('bank')" class="px-3 py-1 bg-green-100 rounded">
                    银行
                </button>

            </div>

            <div class="flex justify-center mt-3 space-x-4 text-xs border-t pt-3">

                <button
                    @click="timeRange='week'; render('total')"
                    :class="timeRange==='week' ? 'bg-black text-white' : 'bg-gray-100'"
                    class="px-2 py-1 rounded">
                    7天
                </button>

                <button
                    @click="timeRange='monthly'; render('total')"
                    :class="timeRange==='monthly' ? 'bg-black text-white' : 'bg-gray-100'"
                    class="px-2 py-1 rounded">
                    每月1号
                </button>

            </div>

        </div>

    </section>

</div>

<script>
const { createApp, ref, nextTick } = Vue;

createApp({
setup() {

const showChart = ref(true);
const timeRange = ref('week');

let chart = null;

const wealthHistory = ref([
{ date: '2026/1/1', total: 1000, parts: { ali: 300, bank: 700 } },
{ date: '2026/2/1', total: 1500, parts: { ali: 500, bank: 1000 } },
{ date: '2026/3/1', total: 1800, parts: { ali: 600, bank: 1200 } },
{ date: '2026/4/1', total: 2200, parts: { ali: 800, bank: 1400 } },
]);

const render = (type) => {

nextTick(() => {

const ctx = document.getElementById('chart');
if (!ctx) return;

if (chart) chart.destroy();

let data = [];

if (timeRange.value === 'monthly') {
    data = wealthHistory.value.filter(i => {
        const d = new Date(i.date);
        return d.getDate() === 1;
    }).slice(-6);
} else {
    data = wealthHistory.value.slice(-7);
}

const labels = data.map(i => {
    const d = new Date(i.date);
    return timeRange.value === 'monthly'
        ? (d.getMonth() + 1) + '月'
        : d.getDate() + '日';
});

let values = [];

if (type === 'total') {
    values = data.map(i => i.total);
} else if (type === 'alipay') {
    values = data.map(i => i.parts.ali || 0);
} else {
    values = data.map(i => i.parts.bank || 0);
}

chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels,
        datasets: [{
            data: values,
            borderColor: '#d946ef',
            fill: true,
            tension: 0.4,
            pointRadius: 3
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
            y: { display: false },
            x: { grid: { display: false } }
        }
    }
});

});

};

return {
showChart,
timeRange,
render
};

}

}).mount('#app');
</script>

</body>
</html>
