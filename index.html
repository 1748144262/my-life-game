<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LifeOS Core V11</title>
    <script src="https://cdn.staticfile.org/vue/3.3.4/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        body { background-color: #fcfcfd; font-family: -apple-system, sans-serif; padding-bottom: 90px; color: #1e293b; }
        .card { background: white; border-radius: 20px; border: 1px solid #f1f5f9; transition: all 0.3s ease; }
        .nav-active { color: #8b5cf6; font-weight: 900; }
        
        /* 愿望卡片色系 */
        .color-pink { background-color: #fdf2f8; }
        .color-green { background-color: #f0fdf4; }
        .color-blue { background-color: #eff6ff; }
        .color-purple { background-color: #f5f3ff; }
        .color-yellow { background-color: #fffbeb; }

        .wish-checkbox { width: 18px; height: 18px; border-radius: 6px; accent-color: #8b5cf6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-4">
    <div id="app" v-cloak class="max-w-md mx-auto px-4">

        <section v-show="activeTab === 'home'" class="space-y-4">
             <div class="flex items-center justify-between px-1">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">🦄</span>
                    <h1 class="text-sm font-black text-slate-400 uppercase tracking-widest">{{ user.title }}</h1>
                </div>
                <div class="flex items-center space-x-2">
                    <span class="text-[10px] font-bold bg-slate-100 px-2 py-0.5 rounded text-slate-500">{{ user.status }}</span>
                </div>
            </div>

            <div class="card p-4 grid grid-cols-2 gap-4">
                <div v-for="(attr, key) in displayAttributes" :key="key" class="space-y-1">
                    <div class="flex justify-between items-end">
                        <span class="text-[10px] font-bold text-slate-400">{{ attr.name }}</span>
                        <span class="text-[10px] font-mono font-bold text-slate-600">Lv.{{ attr.lv }}</span>
                    </div>
                    <div class="h-1 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full" :class="attr.color" :style="{width: attr.percent + '%'}"></div>
                    </div>
                </div>
            </div>
            
            <div class="flex space-x-2 overflow-x-auto no-scrollbar py-2">
                <div v-for="w in activeWishes.slice(0,3)" :key="w.id" class="flex-shrink-0 px-4 py-2 rounded-full text-[10px] font-bold border border-slate-100 bg-white text-slate-500">
                    ✨ {{ w.title }}
                </div>
            </div>
        </section>

        <section v-show="activeTab === 'wish'" class="space-y-5 animate-in slide-in-from-right">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-black italic tracking-tight">WISH LIST</h2>
                <div class="flex bg-slate-100 p-1 rounded-xl text-[10px] font-bold">
                    <button @click="wishTab='active'" :class="wishTab==='active'?'bg-white text-indigo-600 shadow-sm':''" class="px-4 py-1.5 rounded-lg transition-all">未实现</button>
                    <button @click="wishTab='done'" :class="wishTab==='done'?'bg-white text-indigo-600 shadow-sm':''" class="px-4 py-1.5 rounded-lg transition-all">已实现</button>
                </div>
            </div>

            <div v-if="wishTab==='active'" class="grid grid-cols-2 gap-3">
                <div v-for="w in activeWishes" :key="w.id" @click="editWish(w)" 
                     class="card p-4 aspect-square flex flex-col justify-between relative overflow-hidden" :class="w.colorClass">
                    <div class="flex justify-between items-start z-10">
                        <div class="text-xs font-black text-slate-800 leading-tight pr-4">{{ w.title }}</div>
                        <input type="checkbox" @click.stop="toggleWish(w)" class="wish-checkbox">
                    </div>
                    <div class="z-10">
                        <div class="text-[9px] font-mono text-slate-400">￥{{ w.price.toLocaleString() }}</div>
                        <div v-if="w.note" class="text-[8px] text-slate-400 mt-1 italic truncate">“{{ w.note }}”</div>
                    </div>
                    <div class="absolute -right-2 -bottom-2 text-4xl opacity-5 grayscale">🎁</div>
                </div>
                <button @click="addWish" class="card aspect-square border-2 border-dashed border-slate-200 flex items-center justify-center text-slate-300 text-2xl hover:border-indigo-200 hover:text-indigo-200 transition-colors">+</button>
            </div>

            <div v-else class="space-y-3">
                <div v-for="w in doneWishes" :key="w.id" @click="editWish(w)" class="card p-4 flex items-center bg-slate-50 border-none">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center text-lg mr-4" :class="w.colorClass">🎉</div>
                    <div class="flex-1 min-w-0">
                        <div class="text-xs font-black text-slate-400 line-through">{{ w.title }}</div>
                        <div class="text-[9px] text-slate-400 mt-0.5">达成日期: {{ w.doneDate }}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] font-mono font-bold text-emerald-500">￥{{ w.price }}</div>
                    </div>
                </div>
            </div>
        </section>

        <div v-if="editingWish" class="fixed inset-0 bg-white z-50 p-8 flex flex-col animate-in fade-in zoom-in duration-200">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-black italic">{{ editingWish.id ? '编辑愿望' : '新增愿望' }}</h2>
                <button @click="editingWish = null" class="text-2xl text-slate-300">✕</button>
            </div>
            
            <div class="space-y-6 flex-1 overflow-y-auto no-scrollbar">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">卡片视觉</label>
                    <div class="flex gap-3 mt-3">
                        <div v-for="c in ['pink', 'green', 'blue', 'purple', 'yellow']" :key="c" 
                             @click="editingWish.colorClass = 'color-'+c"
                             class="w-8 h-8 rounded-full border-2 transition-transform active:scale-90" 
                             :class="['color-'+c, editingWish.colorClass === 'color-'+c ? 'border-indigo-500 scale-110 shadow-md' : 'border-transparent']"></div>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase">愿望名称</label>
                        <input v-model="editingWish.title" class="w-full text-sm font-bold bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 ring-indigo-100">
                    </div>
                    
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase">预估金额 (￥)</label>
                        <input v-model.number="editingWish.price" type="number" class="w-full text-sm font-mono font-bold bg-slate-50 p-4 rounded-2xl outline-none">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase">我的备注</label>
                        <textarea v-model="editingWish.note" rows="3" 
                                  class="w-full text-xs bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 ring-indigo-100 leading-relaxed" 
                                  placeholder="写下你为什么想要它，或者实现它的计划..."></textarea>
                    </div>
                </div>
            </div>

            <div class="flex gap-4 pt-6 border-t">
                <button v-if="editingWish.id" @click="deleteWish(editingWish.id)" class="px-4 text-rose-400 font-bold text-xs">删除记录</button>
                <button @click="saveWish" class="flex-1 bg-indigo-500 text-white py-4 rounded-2xl font-black text-sm shadow-xl shadow-indigo-100">保存存档</button>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-50 flex justify-around py-4 pb-8 z-40">
            <div v-for="t in tabs" :key="t.id" @click="activeTab = t.id" class="flex flex-col items-center space-y-1" :class="{'nav-active': activeTab === t.id}">
                <span class="text-xl">{{ t.icon }}</span>
                <span class="text-[8px] font-black uppercase">{{ t.label }}</span>
            </div>
        </nav>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, watch } = Vue;

        createApp({
            setup() {
                const activeTab = ref('home');
                const tabs = [
                    {id:'home',icon:'💎',label:'看板'},
                    {id:'todo',icon:'⚡',label:'任务'},
                    {id:'skill',icon:'🧬',label:'技能树'},
                    {id:'wealth',icon:'💰',label:'资产'},
                    {id:'wish',icon:'🌈',label:'愿望'}
                ];

                const user = ref({ title: '觉醒者', wealth: 12000, status: '正常' });
                const attributes = ref({
                    int: { name: '智慧 INT', xp: 1200, color: 'bg-indigo-400' },
                    str: { name: '力量 STR', xp: 850, color: 'bg-rose-400' },
                    san: { name: '心情 SAN', xp: 2100, color: 'bg-amber-400' }
                });

                const wishes = ref([]);
                const wishTab = ref('active');
                const editingWish = ref(null);

                // 计算属性
                const displayAttributes = computed(() => {
                    const attrs = {};
                    Object.keys(attributes.value).forEach(k => {
                        const xp = attributes.value[k].xp;
                        attrs[k] = {
                            name: attributes.value[k].name,
                            lv: Math.floor(xp / 1000) + 1,
                            percent: (xp % 1000) / 10,
                            color: attributes.value[k].color
                        };
                    });
                    attrs['wealth'] = {
                        name: '资产余额',
                        lv: (user.value.wealth / 10000).toFixed(1) + 'w',
                        percent: Math.min(100, user.value.wealth / 500),
                        color: 'bg-emerald-400'
                    };
                    return attrs;
                });

                const activeWishes = computed(() => wishes.value.filter(w => !w.done));
                const doneWishes = computed(() => wishes.value.filter(w => w.done));

                // 愿望方法
                const addWish = () => {
                    editingWish.value = { title: '', price: 0, note: '', colorClass: 'color-purple', done: false };
                };

                const editWish = (w) => {
                    editingWish.value = { ...w };
                };

                const saveWish = () => {
                    if(!editingWish.value.title) return;
                    if(!editingWish.value.id) {
                        editingWish.value.id = Date.now();
                        wishes.value.push(editingWish.value);
                    } else {
                        const idx = wishes.value.findIndex(w => w.id === editingWish.value.id);
                        wishes.value[idx] = editingWish.value;
                    }
                    editingWish.value = null;
                };

                const toggleWish = (w) => {
                    w.done = !w.done;
                    w.doneDate = w.done ? new Date().toLocaleDateString() : null;
                };

                const deleteWish = (id) => {
                    wishes.value = wishes.value.filter(w => w.id !== id);
                    editingWish.value = null;
                };

                onMounted(() => {
                    const s = localStorage.getItem('LifeOS_V11_Storage');
                    if(s) {
                        const d = JSON.parse(s);
                        user.value = d.user; attributes.value = d.attributes; wishes.value = d.wishes || [];
                    }
                });

                watch([user, attributes, wishes], () => {
                    localStorage.setItem('LifeOS_V11_Storage', JSON.stringify({
                        user: user.value, attributes: attributes.value, wishes: wishes.value
                    }));
                }, { deep: true });

                return {
                    activeTab, tabs, user, attributes, wishes, wishTab, editingWish,
                    displayAttributes, activeWishes, doneWishes,
                    addWish, editWish, saveWish, toggleWish, deleteWish
                };
            }
        }).mount('#app')
    </script>
</body>
</html>
