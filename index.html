<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LifeOS V15 Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'PingFang SC', system-ui, sans-serif; background: #f8fafc; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="app" class="max-w-md mx-auto min-h-screen pb-24 relative shadow-2xl bg-white">
        
        <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl p-6 flex justify-between items-center border-b border-slate-100">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-slate-800">LIFE OS <span class="text-fuchsia-500">V15</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{{ user.title }}</p>
            </div>
            <div @click="activeTab = 'home'" class="w-10 h-10 rounded-full bg-slate-900 flex items-center justify-center text-white cursor-pointer shadow-lg active:scale-90 transition-transform">
                <i class="fas fa-bolt text-xs"></i>
            </div>
        </nav>

        <main class="p-6">
            <div v-if="activeTab === 'home'" class="space-y-6">
                <div class="bg-slate-900 rounded-[32px] p-8 text-white shadow-2xl relative overflow-hidden">
                    <div class="relative z-10">
                        <div class="flex justify-between items-start mb-8">
                            <span :class="statusColor" class="px-3 py-1 rounded-full text-[10px] font-black text-slate-900 uppercase tracking-wider">{{ user.status }}</span>
                        </div>
                        <div v-for="(attr, key) in displayAttributes" :key="key" class="mb-6 last:mb-0">
                            <div class="flex justify-between text-[10px] font-black uppercase tracking-widest mb-2 opacity-70">
                                <span>{{ attr.name }}</span>
                                <span>{{ attr.valDisplay }}</span>
                            </div>
                            <div class="h-1.5 bg-white/10 rounded-full overflow-hidden">
                                <div :class="attr.color" class="h-full transition-all duration-1000" :style="{ width: attr.percent + '%' }"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div v-if="activeTab === 'skill'" class="space-y-4">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black italic uppercase">Skills</h2>
                    <button @click="addSkill" class="w-10 h-10 bg-fuchsia-100 text-fuchsia-600 rounded-full flex items-center justify-center active:scale-90 transition-transform">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div v-for="s in skills" :key="s.id" class="group bg-white border-2 border-slate-100 rounded-3xl p-5 hover:border-fuchsia-200 transition-all">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4" @click="selectedSkill = (selectedSkill === s.id ? null : s.id)">
                            <div class="text-2xl">{{ s.icon || '💎' }}</div>
                            <div>
                                <h3 class="font-bold text-slate-800">{{ s.name }}</h3>
                                <p class="text-[10px] font-bold text-slate-400">XP: {{ s.xp }} / COUNT: {{ s.count }}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button @click="editingSkill = s" class="w-8 h-8 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center hover:bg-fuchsia-50 hover:text-fuchsia-500">
                                <i class="fas fa-sliders-h text-[10px]"></i>
                            </button>
                            <button @click="deleteSkill(s.id)" class="w-8 h-8 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center hover:bg-rose-50 hover:text-rose-500">
                                <i class="fas fa-trash-alt text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div v-if="activeTab === 'wealth'" class="space-y-6">
                <h2 class="text-xl font-black italic uppercase">System Backup</h2>
                <div class="grid grid-cols-2 gap-4">
                    <button @click="exportData" class="p-6 bg-slate-900 text-white rounded-[24px] text-center active:scale-95 transition-transform">
                        <i class="fas fa-download mb-2 block text-xl text-fuchsia-400"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">导出记忆</span>
                    </button>
                    <button @click="importData" class="p-6 bg-white border-2 border-slate-900 rounded-[24px] text-center active:scale-95 transition-transform">
                        <i class="fas fa-upload mb-2 block text-xl text-slate-900"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-900">注入记忆</span>
                    </button>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-xl
