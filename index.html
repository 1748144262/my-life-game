<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeOS Pro V15 FIXED</title>

<script src="https://cdn.staticfile.org/vue/3.3.4/vue.global.prod.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
[v-cloak]{display:none;}
body{background:#fdf2f8;font-family:sans-serif;}
.card{background:white;border-radius:20px;padding:16px;}
</style>
</head>

<body>
<div id="app" v-cloak>

<h2>LifeOS（修复版）</h2>

<button @click="showWealthChart = !showWealthChart">
切换图表
</button>

<div v-if="showWealthChart">
<canvas id="wealthLineChart"></canvas>
</div>

<button @click="confirmWealth">记录资产</button>

</div>

<script>
const {createApp, ref, onMounted, nextTick, watch} = Vue;

createApp({
setup(){

const showWealthChart = ref(false);

const wealthParts = ref({
ali:0,bank:0,cmb:0,other:0,wechat:0
});

const wealthHistory = ref([]);
let wealthChart = null;

const chartMode = ref('monthly');
const startDate = ref('');
const endDate = ref('');

const confirmWealth = ()=>{
wealthHistory.value.push({
date:new Date().toISOString(),
total:Object.values(wealthParts.value).reduce((a,b)=>a+b,0)
});
alert("已记录");
if(showWealthChart.value) renderChart();
};

const renderChart = ()=>{
nextTick(()=>{
const canvas=document.getElementById('wealthLineChart');
if(!canvas) return;

const ctx=canvas.getContext('2d');
if(wealthChart) wealthChart.destroy();

let data=[...wealthHistory.value];

if(chartMode.value==='range' && startDate.value && endDate.value){
const s=new Date(startDate.value);
const e=new Date(endDate.value);
data=data.filter(i=>{
const d=new Date(i.date);
return d>=s && d<=e;
});
}else{
data=data.filter(i=>{
return new Date(i.date).getDate()===1;
});
}

if(data.length===0) return;

wealthChart=new Chart(ctx,{
type:'line',
data:{
labels:data.map(i=>i.date),
datasets:[{
data:data.map(i=>i.total),
borderColor:'#d946ef'
}]
},
options:{responsive:true}
});
});
};

onMounted(()=>{
const s=localStorage.getItem('LifeOS_V15_Master');
if(s){
const d=JSON.parse(s);
wealthHistory.value=d.wealthHistory||[];
}
});

watch(wealthHistory,()=>{
localStorage.setItem('LifeOS_V15_Master',
JSON.stringify({wealthHistory:wealthHistory.value})
);
},{deep:true});

watch(showWealthChart,(v)=>{
if(v) renderChart();
});

return{
showWealthChart,
confirmWealth,
renderChart
};

}
}).mount('#app');
</script>

</body>
</html>
